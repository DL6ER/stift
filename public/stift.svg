<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="6" fill="#312e81"/>
  <!-- Pen body (angled) -->
  <g transform="rotate(-45, 16, 16)">
    <rect x="13" y="5" width="6" height="16" rx="1.5" fill="#818cf8"/>
    <rect x="13" y="17" width="6" height="4" rx="1" fill="#a5b4fc"/>
    <polygon points="13,21 19,21 16,27" fill="#c7d2fe"/>
    <line x1="16" y1="27" x2="16" y2="28.5" stroke="#f9fafb" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <!-- Annotation dot -->
  <circle cx="25" cy="8" r="2.5" fill="#f59e0b"/>
  <!-- Small mark line -->
  <line x1="5" y1="25" x2="10" y2="25" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
</svg>
