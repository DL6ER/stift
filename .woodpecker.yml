when:
  - event: [push, pull_request, manual]

steps:
  install:
    image: node:22-slim
    commands:
      - npm ci

  build:
    image: node:22-slim
    commands:
      - npm run build
    depends_on: [install]

  test:
    image: node:22-slim
    commands:
      - npm test -- --reporter=default
    depends_on: [install]
