name: CI

# Runs on every push to any branch and on every pull request.
# Mirrors the local "npm test && npm run build" pattern that the
# PR checklist asks contributors to run before opening a PR -- the
# CI just makes it visible on the GitHub side.

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

# Stop in-progress runs for the same ref when a new push lands. Cuts
# the wait time on rebases / force-pushes by half.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: vitest + build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # `npm ci` is the CI-friendly install: it requires
        # package-lock.json to exist, refuses to update it, and
        # gives reproducible installs.
        run: npm ci

      - name: Run vitest
        run: npm test

      - name: Type check + production build
        # `npm run build` is `tsc -b && vite build`, so it covers
        # both type errors and the actual bundle. The CI catches
        # any TS regression that the unit tests miss.
        run: npm run build

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  visual:
    name: visual regression
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Stift container
        run: docker build -t stift-ci .

      - name: Start Stift container
        run: |
          docker run -d --name stift-ci \
            -p 8080:8080 \
            -v ${{ github.workspace }}/data:/data \
            stift-ci
          # Wait for the health check to pass
          for i in $(seq 1 30); do
            if docker exec stift-ci wget -q --spider http://127.0.0.1:8080/api/config 2>/dev/null; then
              echo "Stift is ready"
              break
            fi
            echo "Waiting for Stift... ($i/30)"
            sleep 2
          done

      - name: Run visual regression tests
        run: |
          docker run --rm \
            --add-host=host.docker.internal:host-gateway \
            -e URL=http://host.docker.internal:8080 \
            -e THRESHOLD=0.01 \
            -v ${{ github.workspace }}/scripts:/scripts-src:ro \
            -v ${{ github.workspace }}/test/reference:/reference:ro \
            -v ${{ github.workspace }}/test:/screenshots \
            mcr.microsoft.com/playwright:v1.52.0-noble \
            bash -c "
              cp /scripts-src/*.mjs /tmp/ && cd /tmp &&
              npm install playwright@1.52.0 pngjs 2>/dev/null &&
              node test-examples.mjs
            "

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-failures
          path: |
            test/*_actual.png
            test/*_diff.png
          retention-days: 7

      - name: Stop Stift container
        if: always()
        run: docker rm -f stift-ci 2>/dev/null || true
