# Custom nginx main config for non-root operation inside the Stift
# container. Replaces /etc/nginx/nginx.conf shipped with the alpine
# nginx package.
#
# Why we need a custom one: the default alpine config sets
#   user nginx;
#   pid  /run/nginx/nginx.pid;
#   error_log /var/log/nginx/error.log warn;
# all of which require root or write access to paths a non-root
# container user can't touch. The Dockerfile drops to USER node
# (UID 1000) before running this, so nginx must:
#
#   - NOT use the `user` directive (only root can switch user)
#   - write its PID file to a directory the node user owns (/tmp)
#   - log to stdout/stderr so docker's log driver picks them up
#   - put its client/proxy/fastcgi/etc. temp dirs in /tmp
#
# The server block (listen, location, security headers, etc.) lives
# in /etc/nginx/http.d/default.conf and is included from the http
# block at the end of this file.

# `user` directive intentionally omitted. nginx inherits whatever
# user the entrypoint started it as (node, UID 1000).
worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
  access_log /dev/stdout  main;

  # Temp / cache paths. Every directive that defaults to a path
  # under /var/lib/nginx must be redirected to a node-writable
  # location.
  client_body_temp_path /tmp/nginx-client-body;
  proxy_temp_path       /tmp/nginx-proxy;
  fastcgi_temp_path     /tmp/nginx-fastcgi;
  uwsgi_temp_path       /tmp/nginx-uwsgi;
  scgi_temp_path        /tmp/nginx-scgi;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  server_tokens   off;

  # Compression for text assets. Image / pdf / archive types stay
  # uncompressed because they're already entropy-coded.
  gzip              on;
  gzip_vary         on;
  gzip_min_length   1024;
  gzip_proxied      any;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    image/svg+xml;

  # Pull in /etc/nginx/http.d/default.conf which carries the actual
  # server { ... } block, security headers, /api/ proxy, SPA fallback.
  include /etc/nginx/http.d/*.conf;
}
