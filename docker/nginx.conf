server {
    # 8080 (>1024) so the worker processes don't need
    # CAP_NET_BIND_SERVICE. The container runs as the unprivileged
    # `node` user. The host port mapping in docker-compose.yml maps
    # whatever the operator picks (default 8080) to this internal
    # 8080. Caddy in the proxied compose talks to stift:8080.
    listen 8080;
    server_name _;

    root /app/static;
    index index.html;

    # Security headers (apply to every response, including the SPA).
    # Stift makes zero third-party requests; the CSP enforces that as a hard
    # rule. 'unsafe-inline' for styles is required by the build's inline
    # critical CSS. Scripts are locked to 'self' only.
    #
    # nginx note: add_header in a child location does NOT inherit from
    # parents if that child has its own add_header. We deliberately keep
    # ALL header directives at the server scope and avoid per-location
    # add_header so the security headers always apply.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'none'; form-action 'self'; object-src 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    # HSTS is set by the reverse proxy (Caddy / Traefik) when serving HTTPS,
    # so we don't add it here; it would be a no-op (or worse, misleading)
    # over plain HTTP on an internal network.

    # API proxy to Node.js server
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 100M;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed Vite assets. Use the `expires` directive (which
    # emits a Cache-Control header without resetting other add_header
    # inheritance) instead of an inline add_header.
    location /assets/ {
        expires 1y;
    }
}
